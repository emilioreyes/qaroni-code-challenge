<mat-card class="card" appearance="outlined">
  <mat-card-header>
    <mat-card-title class="card--title">{{store.item()?.name}}</mat-card-title>
    <mat-card-subtitle class="card--subtitle"><span>{{store.item()?.metatags?.[0]?.type}}/{{store.item()?.metatags?.[0]?.typeName}}</span>  <span> Actualizado: {{store.item()?.lastUpdateDate|date :environment.DATE_TIME_FORMAT }}</span></mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image [src]="store.item()?.imageUrl" alt="Photo of a Shiba Inu">
  <mat-card-content class="card--content">
    <p>
      {{store.item()?.description}}
    </p>
  </mat-card-content>
</mat-card>

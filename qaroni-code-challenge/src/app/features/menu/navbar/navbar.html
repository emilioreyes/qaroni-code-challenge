<ul class="space-y-2 font-medium sub-menu">
  <div class="wrap__header pt-4 pb-2">
    <p class="text-center !m-0 text-3xl">
      <span class="text-sky-700 dark:text-white">QARONI</span>
    </p>
  </div>
  <hr class="h-px my-8 bg-slate-400 border-0 dark:text-slate-500 mb-0" />
  <p class="text-gray-500 dark:text-slate-400 text-sm pt-4 px-6 py-2 mt-0">MAIN-MENU</p>
  <li>
    <a
      [routerLink]="'/home/news'"
      class="flex items-center px-6 py-2 mx-2 text-sky-700 group hover:bg-sky-100 rounded-lg hover:text-sky-800 dark:text-slate-400 dark:hover:bg-gray-500 dark:hover:text-white"
    >
      <mat-icon> mode_comment</mat-icon>
      <span class="ms-3" (click)="onHideSubmenu()" >NEWS</span>
    </a>
  </li>
  <li>
    <a
      [routerLink]="'/home/groups'"
      class="flex items-center px-6 py-2 mx-2 text-sky-700 group hover:bg-sky-100 rounded-lg hover:text-sky-800 dark:text-slate-400 dark:hover:bg-gray-500 dark:hover:text-white"
    >
      <mat-icon>folder_shared</mat-icon>
      <span class="ms-3" (click)="onHideSubmenu()" >GROUPS</span>
    </a>
  </li>
  <li>
    <a
      [routerLink]="'/home/form'"
      class="flex items-center px-6 py-2 mx-2 text-sky-700 group hover:bg-sky-100 rounded-lg hover:text-sky-800 dark:text-slate-400 dark:hover:bg-gray-500 dark:hover:text-white"
    >
      <mat-icon>supervised_user_circle</mat-icon>
      <span class="ms-3" (click)="onHideSubmenu()" >FORM</span>
    </a>
  </li>
  <li>
    <a
      (click)="onClickLogout()"
      class="flex cursor-pointer items-center px-6 py-2 mx-2 text-sky-700 group rounded-lg hover:bg-sky-100 hover:text-sky-800 dark:text-slate-400 dark:hover:bg-gray-500 dark:hover:text-white"
    >
      <mat-icon>keyboard_backspace</mat-icon>
      <span class="ml-4">LOGOUT</span>
    </a>
  </li>
</ul>

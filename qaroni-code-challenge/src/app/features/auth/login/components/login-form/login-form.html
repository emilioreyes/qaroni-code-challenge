<div class="flex justify-center items-center h-screen">
  <mat-card class="form-wrap" appearance="outlined">
    <form (ngSubmit)="onSubmit()">
      <mat-card-header class="form-header">
        <mat-card-title-group>
          <mat-card-title class="form-header__title">Start session</mat-card-title>
          <mat-card-subtitle class="form-header__subtitle"
            >Enter your credentials to continue</mat-card-subtitle
          >
        </mat-card-title-group>
      </mat-card-header>
      <mat-card-content class="form-container">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input
            class="form-container__input"
            id="username"
            type="email"
            matInput
            placeholder="mi@mail.com"
            [ngModel]="username()"
            name="username"
            (ngModelChange)="onUsernameChange($event)"
          />
          <mat-icon matSuffix fontIcon="account_circle"></mat-icon>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input
            class="form-container__input"
            id="password"
            type="password"
            matInput
            placeholder="********"
            [ngModel]="password()"
            name="password"
            (ngModelChange)="onPasswordChange($event)"
          />
          <mat-icon matSuffix fontIcon="lock"></mat-icon>
        </mat-form-field>
      </mat-card-content>
      <mat-card-footer class="form-footer">
        <button class="form-footer__button" matButton="filled" type="submit">
          @if (loading()) {
            <span>Loading...</span>
          } @else {
            <span>Login</span>
          }
        </button>
      </mat-card-footer>
    </form>
  </mat-card>
</div>
